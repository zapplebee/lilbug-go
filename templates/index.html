<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lilbug Rover Control</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c1220;
      --panel: #111a2e;
      --accent: #7dd3fc;
      --accent-strong: #38bdf8;
      --text: #e5eefb;
      --muted: #8ca2c0;
      --danger: #fb7185;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 35%),
        linear-gradient(180deg, #08101c 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      width: min(1100px, calc(100vw - 2rem));
      margin: 0 auto;
      padding: 1.5rem 0 2rem;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: clamp(2rem, 4vw, 3.5rem);
    }

    p {
      color: var(--muted);
      margin: 0;
    }

    .layout {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1.3fr 0.9fr;
      margin-top: 1.5rem;
    }

    .card {
      background: rgba(17, 26, 46, 0.9);
      border: 1px solid rgba(125, 211, 252, 0.12);
      border-radius: 20px;
      padding: 1rem;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
    }

    .camera {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      border-radius: 14px;
      background: #030712;
    }

    .camera-frame {
      border-radius: 14px;
      overflow: hidden;
      background: #030712;
    }

    .camera-frame:fullscreen,
    .camera-frame:-webkit-full-screen {
      display: grid;
      place-items: center;
      width: 100vw;
      height: 100vh;
      background: #000;
      border-radius: 0;
    }

    .camera-frame:fullscreen .camera,
    .camera-frame:-webkit-full-screen .camera {
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      aspect-ratio: auto;
      object-fit: contain;
      border-radius: 0;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .camera-toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.75rem;
    }

    .status strong {
      color: var(--accent);
      text-transform: capitalize;
    }

    .grid {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-areas:
        ". forward ."
        "left stop right"
        ". reverse .";
      margin-top: 1rem;
    }

    button {
      min-height: 84px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.18), rgba(56, 189, 248, 0.08));
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    button:hover, button:focus-visible {
      transform: translateY(-1px);
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.26), rgba(56, 189, 248, 0.12));
      outline: none;
    }

    button.active {
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.42), rgba(56, 189, 248, 0.18));
      box-shadow: 0 0 0 1px rgba(125, 211, 252, 0.2) inset;
    }

    #forward { grid-area: forward; }
    #left { grid-area: left; }
    #stop { grid-area: stop; background: linear-gradient(180deg, rgba(251, 113, 133, 0.35), rgba(251, 113, 133, 0.15)); }
    #right { grid-area: right; }
    #reverse { grid-area: reverse; }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.95rem;
      color: var(--muted);
    }

    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
      button { min-height: 72px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Lilbug Rover Control</h1>
      <p>Press and hold a direction, then release to stop. Keyboard, d-pad, and left stick all work.</p>
    </header>

    <section class="layout">
      <div class="card">
        <div class="camera-toolbar">
          <button id="fullscreen" type="button">Fullscreen</button>
        </div>
        <div class="camera-frame" id="camera-frame">
          <img class="camera" src="/stream.mjpg" alt="Live rover camera stream">
        </div>
        <div class="status">
          <span>Current motion: <strong id="current-action">stop</strong></span>
          <span id="connection-status">Connecting...</span>
        </div>
      </div>

      <div class="card">
        <div class="grid">
          <button id="forward" data-action="forward">Forward</button>
          <button id="left" data-action="left">Left</button>
          <button id="stop" data-action="stop">Stop</button>
          <button id="right" data-action="right">Right</button>
          <button id="reverse" data-action="reverse">Reverse</button>
        </div>
        <p class="hint">Keyboard: Up, Left, Right, Down, Space. Gamepad: d-pad or left stick for direct direction input.</p>
      </div>
    </section>
  </main>

  <script>
    const actionLabel = document.getElementById("current-action");
    const connectionLabel = document.getElementById("connection-status");
    const buttons = [...document.querySelectorAll("button[data-action]")];
    const cameraFrame = document.getElementById("camera-frame");
    const camera = document.querySelector(".camera");
    let activeAction = "stop";
    let lastSentAction = "stop";
    let activeGamepadIndex = null;

    function setActiveAction(action) {
      activeAction = action;
      actionLabel.textContent = action;
    }

    function updateActiveButtons(action) {
      buttons.forEach((button) => {
        button.classList.toggle("active", button.dataset.action === action);
      });
    }

    async function sendAction(action) {
      const path = action === "stop" ? "/api/stop" : `/api/move/${action}`;
      const response = await fetch(path, { method: "POST" });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || `Request failed: ${response.status}`);
      }

      setActiveAction(payload.action);
      lastSentAction = payload.action;
      updateActiveButtons(payload.action);
      connectionLabel.textContent = "Connected";
    }

    function syncAction(action) {
      if (action === lastSentAction) {
        return;
      }
      sendAction(action).catch(showError);
    }

    function bindHold(button) {
      const action = button.dataset.action;

      if (action === "stop") {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          syncAction("stop");
        });
        return;
      }

      const start = (event) => {
        event.preventDefault();
        syncAction(action);
      };

      const stop = (event) => {
        event.preventDefault();
        if (activeAction === action) {
          syncAction("stop");
        }
      };

      button.addEventListener("mousedown", start);
      button.addEventListener("mouseup", stop);
      button.addEventListener("mouseleave", stop);
      button.addEventListener("touchstart", start, { passive: false });
      button.addEventListener("touchend", stop, { passive: false });
      button.addEventListener("touchcancel", stop, { passive: false });
    }

    function showError(error) {
      connectionLabel.textContent = error.message;
    }

    function gamepadToAction(gamepad) {
      const axisX = gamepad.axes[0] || 0;
      const axisY = gamepad.axes[1] || 0;
      const threshold = 0.35;
      const dpadUp = gamepad.buttons[12]?.pressed === true;
      const dpadDown = gamepad.buttons[13]?.pressed === true;
      const dpadLeft = gamepad.buttons[14]?.pressed === true;
      const dpadRight = gamepad.buttons[15]?.pressed === true;

      if (dpadUp || axisY < -threshold) {
        return "forward";
      }
      if (dpadDown || axisY > threshold) {
        return "reverse";
      }
      if (dpadLeft || axisX < -threshold) {
        return "left";
      }
      if (dpadRight || axisX > threshold) {
        return "right";
      }
      return "stop";
    }

    function pollGamepad() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      let pad = null;

      if (activeGamepadIndex !== null && pads[activeGamepadIndex]) {
        pad = pads[activeGamepadIndex];
      } else {
        pad = [...pads].find(Boolean) || null;
        activeGamepadIndex = pad ? pad.index : null;
      }

      if (pad) {
        connectionLabel.textContent = `${pad.id} connected`;
        syncAction(gamepadToAction(pad));
      } else if (activeGamepadIndex !== null) {
        activeGamepadIndex = null;
        syncAction("stop");
      }

      window.requestAnimationFrame(pollGamepad);
    }

    const keyboardMap = {
      ArrowUp: "forward",
      ArrowLeft: "left",
      ArrowRight: "right",
      ArrowDown: "reverse",
    };

    window.addEventListener("keydown", (event) => {
      if (event.key === " ") {
        event.preventDefault();
        syncAction("stop");
        return;
      }

      const control = keyboardMap[event.key];
      if (!control || event.repeat) {
        return;
      }

      event.preventDefault();
      syncAction(control);
    });

    window.addEventListener("keyup", (event) => {
      const control = keyboardMap[event.key];
      if (!control) {
        return;
      }

      event.preventDefault();
      if (activeAction === control) {
        syncAction("stop");
      }
    });

    window.addEventListener("blur", () => {
      syncAction("stop");
    });

    window.addEventListener("gamepadconnected", (event) => {
      activeGamepadIndex = event.gamepad.index;
      connectionLabel.textContent = `${event.gamepad.id} connected`;
    });

    window.addEventListener("gamepaddisconnected", (event) => {
      if (activeGamepadIndex === event.gamepad.index) {
        activeGamepadIndex = null;
        syncAction("stop");
      }
    });

    async function enterFullscreen(element) {
      if (element.requestFullscreen) {
        await element.requestFullscreen();
        return;
      }
      if (element.webkitRequestFullscreen) {
        element.webkitRequestFullscreen();
        return;
      }
      if (element.webkitEnterFullscreen) {
        element.webkitEnterFullscreen();
        return;
      }
      throw new Error("Fullscreen is not supported in this browser");
    }

    async function exitFullscreen() {
      if (document.exitFullscreen) {
        await document.exitFullscreen();
        return;
      }
      if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    }

    document.getElementById("fullscreen").addEventListener("click", async () => {
      try {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          await exitFullscreen();
          return;
        }
        await enterFullscreen(cameraFrame);
      } catch (error) {
        showError(error);
      }
    });

    buttons.forEach(bindHold);

    fetch("/api/status")
      .then((response) => response.json())
      .then((payload) => {
        setActiveAction(payload.action);
        lastSentAction = payload.action;
        updateActiveButtons(payload.action);
        connectionLabel.textContent = payload.gpio_mode === "rpi" ? "Connected to Pi GPIO" : "Connected in fake GPIO mode";
      })
      .catch(showError);

    window.requestAnimationFrame(pollGamepad);
  </script>
</body>
</html>
